<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Garage Door Diagnostic — Minimal Widget</title>
<style>
  :root {
    --accent: #d4541a;
    --accent-hover: #b8471a;
    --text: #1a1a18;
    --muted: #6b7280;
    --border: #e5e7eb;
    --surface: #fff;
    --danger: #c0392b;
    --danger-bg: #fee;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    margin: 0;
    padding: 2rem 1rem;
    background: #fafafa;
    color: var(--text);
    line-height: 1.55;
  }
  .gds-widget {
    max-width: 560px;
    margin: 2rem auto;
    padding: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .gds-widget h2 {
    margin: 0 0 0.5rem;
    font-size: 1.5rem;
    letter-spacing: -0.01em;
  }
  .gds-widget p.lede {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* --- chip mode --- */
  .gds-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 0.25rem 0 0.5rem;
  }
  .gds-chip {
    padding: 0.5rem 0.95rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .gds-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #fffaf6;
  }
  .gds-chip:disabled { opacity: 0.6; cursor: not-allowed; }
  .gds-toggle {
    display: inline-block;
    margin-top: 0.75rem;
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: rgba(0,0,0,0.15);
    font-size: 0.88rem;
    cursor: pointer;
    background: transparent;
    border: 0;
    padding: 0;
    font-family: inherit;
  }
  .gds-toggle:hover { text-decoration-color: currentColor; }

  /* --- text mode --- */
  .gds-widget textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 1rem;
    resize: vertical;
  }
  .gds-widget textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: transparent;
  }
  .gds-widget button.gds-submit {
    margin-top: 0.75rem;
    padding: 0.65rem 1.25rem;
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .gds-widget button.gds-submit:hover { background: var(--accent-hover); }
  .gds-widget button.gds-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  /* --- results --- */
  .gds-results { margin-top: 1.5rem; }
  .gds-issue {
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 0.75rem;
    background: #fafafa;
  }
  .gds-issue h3 {
    margin: 0 0 0.35rem;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .gds-issue .meta {
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0.25rem 0 0.5rem;
  }
  .gds-issue p { margin: 0.5rem 0; font-size: 0.95rem; }
  .gds-issue .unsafe {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    background: var(--danger-bg);
    color: var(--danger);
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .gds-issue .safety, .safety-banner {
    margin-top: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: var(--danger-bg);
    border-left: 3px solid var(--danger);
    border-radius: 4px;
    font-size: 0.9rem;
  }
  .safety-banner {
    margin-top: 0;
    margin-bottom: 0.75rem;
  }
  .gds-nomatch {
    padding: 1rem;
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* --- partner lookup --- */
  .gds-partner-lookup {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  .gds-partner-lookup h3 {
    margin: 0 0 0.35rem;
    font-size: 1.05rem;
  }
  .gds-zip-form {
    display: flex;
    gap: 0.5rem;
    margin: 0.5rem 0 0.75rem;
    flex-wrap: wrap;
  }
  .gds-zip-input {
    flex: 1;
    min-width: 120px;
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 1rem;
    background: #fff;
  }
  .gds-zip-input:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: transparent;
  }
  .gds-zip-submit {
    padding: 0.55rem 1.1rem;
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .gds-zip-submit:hover { background: var(--accent-hover); }
  .gds-zip-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .gds-partner {
    margin-top: 0.5rem;
    padding: 1rem;
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .gds-partner h4 {
    margin: 0 0 0.25rem;
    font-size: 1rem;
  }
  .gds-partner p {
    margin: 0.25rem 0;
    font-size: 0.92rem;
  }
  .gds-partner a { color: var(--accent); }
  .gds-cta {
    display: inline-block;
    margin-top: 0.6rem;
    padding: 0.55rem 1.1rem;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.92rem;
    transition: background 0.15s;
  }
  .gds-cta:hover {
    background: var(--accent-hover);
    color: #fff;
    text-decoration: none;
  }

  .gds-footer {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
  .gds-footer a { color: inherit; text-decoration: underline; text-decoration-color: var(--border); }
  .gds-footer a:hover { color: var(--accent); text-decoration-color: currentColor; }
  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="gds-widget">
  <h2>Diagnose your garage door</h2>

  <div class="gds-chips-view">
    <p class="lede">Pick the closest match to what's happening:</p>
    <div class="gds-chips" role="group" aria-label="Common symptoms"></div>
    <button type="button" class="gds-toggle" data-gds-target="text">
      Don't see it? Describe it in your own words →
    </button>
  </div>

  <div class="gds-text-view" hidden>
    <p class="lede">Describe what's happening in your own words:</p>
    <textarea class="gds-input" placeholder="My door opens fine but won't close all the way. Sometimes it reverses when it gets near the ground."></textarea>
    <button type="button" class="gds-submit">Diagnose</button>
    <div>
      <button type="button" class="gds-toggle" data-gds-target="chips">← Pick from common symptoms instead</button>
    </div>
  </div>

  <div id="gds-results" class="gds-results" role="region" aria-live="polite"></div>
  <p class="gds-footer">Powered by <a href="https://garagedoorscience.com" target="_blank" rel="noopener">garagedoorscience.com</a></p>
</div>

<script>
const GDS_API = 'https://garagedoorscience.com/api/v1';

const SYMPTOMS = [
  { key: 'wont_open',            label: "Won't open",              phrase: "won't open" },
  { key: 'wont_close',           label: "Won't close",             phrase: "won't close" },
  { key: 'loud_grinding',        label: 'Grinding noise',          phrase: 'grinding noise' },
  { key: 'banging_noise',        label: 'Loud bang or reverses',   phrase: 'loud bang' },
  { key: 'moves_unevenly',       label: 'Moves unevenly',          phrase: 'moves unevenly' },
  { key: 'opens_partially',      label: 'Opens partway',           phrase: 'opens partially' },
  { key: 'remote_not_working',   label: 'Remote not working',      phrase: 'remote not working' },
  { key: 'unusual_noise',        label: 'Noisy or squeaky',        phrase: 'loud noise' },
  { key: 'weather_seal_damaged', label: 'Weather seal damaged',    phrase: 'weather seal damaged' },
];

async function diagnose(description, useLlmFallback) {
  const body = { description };
  if (useLlmFallback) body.useLlmFallback = true;
  const res = await fetch(GDS_API + '/diagnose', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

async function routeByZip(zip, issue, leadHeat) {
  const body = { zipOrLocation: zip, leadHeat: leadHeat || 'warm' };
  if (issue) body.issue = issue;
  const res = await fetch(GDS_API + '/routeByZip', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

function el(tag, props, ...children) {
  const node = document.createElement(tag);
  if (props) {
    for (const [k, v] of Object.entries(props)) {
      if (k === 'class') node.className = v;
      else if (k === 'text') node.textContent = v;
      else node.setAttribute(k, v);
    }
  }
  for (const child of children) {
    if (child == null) continue;
    if (typeof child === 'string') node.appendChild(document.createTextNode(child));
    else node.appendChild(child);
  }
  return node;
}

function renderIssue(issue, urgency) {
  const unsafe = issue.diyRisk === 'unsafe';
  const heading = el('h3', null, issue.name || 'Issue');
  if (unsafe) heading.appendChild(el('span', { class: 'unsafe', text: 'Call a pro' }));

  const min = issue.costRange && issue.costRange.min;
  const max = issue.costRange && issue.costRange.max;
  const metaText = 'Typical cost: $' + min + '–$' + max + ' · Urgency: ' + (urgency || 'routine');
  const meta = el('p', { class: 'meta', text: metaText });

  const desc = el('p', { text: issue.description || '' });

  const node = el('div', { class: 'gds-issue' }, heading, meta, desc);
  if (issue.safetyNote) {
    node.appendChild(el('div', { class: 'safety' },
      el('strong', { text: 'Safety note: ' }), issue.safetyNote));
  }
  return node;
}

function renderPartner(resp, container) {
  if (!resp || !resp.covered) {
    container.replaceChildren(
      el('div', { class: 'gds-nomatch' },
        "We don't have a vetted partner in that ZIP yet. Try a nearby ZIP or city."
      )
    );
    return;
  }
  const p = resp.partner || {};
  const card = el('div', { class: 'gds-partner' });
  card.appendChild(el('h4', { text: p.displayName || 'Local pro' }));
  if (resp.region) {
    card.appendChild(el('p', { class: 'meta', text: 'Covers: ' + resp.region }));
  }
  if (p.phone) {
    card.appendChild(el('p', null,
      el('strong', { text: 'Phone: ' }),
      el('a', { href: 'tel:' + p.phone }, p.phone)
    ));
  }
  const ctaHref = p.schedulerUrl || p.url;
  if (ctaHref) {
    card.appendChild(el('a', {
      href: ctaHref,
      class: 'gds-cta',
      target: '_blank',
      rel: 'noopener'
    }, p.schedulerUrl ? 'Schedule →' : 'Visit site →'));
  }
  container.replaceChildren(card);
}

function buildZipLookup(issueKey, safetyFlag) {
  const section = el('div', { class: 'gds-partner-lookup' });
  const heading = el('h3', { text: safetyFlag ? 'Get urgent help nearby' : 'Find a local pro' });
  const lede = el('p', {
    class: 'lede',
    text: safetyFlag
      ? 'Enter your ZIP code to reach a pro fast. Do not operate the door in the meantime.'
      : 'Enter your ZIP code to find a trusted pro near you.'
  });
  const form = el('div', { class: 'gds-zip-form' });
  const input = el('input', {
    type: 'text',
    class: 'gds-zip-input',
    placeholder: 'ZIP',
    inputmode: 'numeric',
    pattern: '[0-9]{5}',
    maxlength: '5',
    'aria-label': 'ZIP code',
  });
  const submitBtn = el('button', { type: 'button', class: 'gds-zip-submit' }, 'Find pro');
  const resultBox = el('div', { class: 'gds-partner-result' });

  async function submitZip() {
    const zip = (input.value || '').trim();
    if (!/^\d{5}$/.test(zip)) {
      resultBox.replaceChildren(el('div', { class: 'gds-nomatch', text: 'Please enter a 5-digit ZIP code.' }));
      return;
    }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Finding…';
    resultBox.replaceChildren();
    try {
      const data = await routeByZip(zip, issueKey, safetyFlag ? 'hot' : 'warm');
      renderPartner(data, resultBox);
    } catch (err) {
      resultBox.replaceChildren(el('div', { class: 'gds-nomatch', text: 'Something went wrong. Try again.' }));
      console.error(err);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Find pro';
    }
  }

  submitBtn.addEventListener('click', submitZip);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitZip(); });

  form.appendChild(input);
  form.appendChild(submitBtn);
  section.appendChild(heading);
  section.appendChild(lede);
  section.appendChild(form);
  section.appendChild(resultBox);
  return section;
}

function render(results, container) {
  container.replaceChildren();
  const issues = results.likelyIssues || [];
  const urgency = results.symptom && results.symptom.urgency;

  if (issues.length === 0) {
    const hint = results.hint || 'No exact match — try a different symptom or phrase.';
    container.appendChild(el('div', { class: 'gds-nomatch', text: hint }));
    return;
  }

  if (results.safetyFlag) {
    container.appendChild(el('div', { class: 'safety-banner' },
      el('strong', { text: 'Safety: ' }),
      'This looks like something that needs a pro. Do not attempt to repair stored-energy components (springs, cables) yourself.'
    ));
  }

  for (let i = 0; i < issues.length; i++) {
    container.appendChild(renderIssue(issues[i], urgency));
  }

  const symptomKey = results.symptom && results.symptom.key;
  container.appendChild(buildZipLookup(symptomKey, !!results.safetyFlag));
}

const chipsContainer = document.querySelector('.gds-chips');
const chipsView = document.querySelector('.gds-chips-view');
const textView = document.querySelector('.gds-text-view');
const input = document.querySelector('.gds-input');
const submitBtn = document.querySelector('.gds-submit');
const results = document.getElementById('gds-results');

async function submit(description, useLlmFallback, activeBtn, originalLabel) {
  activeBtn.disabled = true;
  activeBtn.textContent = 'Thinking…';
  results.replaceChildren();
  try {
    const data = await diagnose(description, useLlmFallback);
    render(data, results);
  } catch (err) {
    results.replaceChildren(el('div', { class: 'gds-nomatch', text: 'Something went wrong. Try again in a moment.' }));
    console.error(err);
  } finally {
    activeBtn.disabled = false;
    activeBtn.textContent = originalLabel;
  }
}

// Chip mode — no LLM fallback; canonical phrase always matches
for (const s of SYMPTOMS) {
  const btn = el('button', { type: 'button', class: 'gds-chip', 'data-key': s.key }, s.label);
  btn.addEventListener('click', () => submit(s.phrase, false, btn, s.label));
  chipsContainer.appendChild(btn);
}

// Toggle between modes
for (const toggle of document.querySelectorAll('.gds-toggle')) {
  toggle.addEventListener('click', () => {
    const target = toggle.getAttribute('data-gds-target');
    chipsView.hidden = target !== 'chips';
    textView.hidden = target !== 'text';
    results.replaceChildren();
    if (target === 'text') input.focus();
  });
}

// Text-mode submit — opts into LLM fallback for colloquial phrasing
submitBtn.addEventListener('click', () => {
  const desc = input.value.trim();
  if (!desc) return;
  submit(desc, true, submitBtn, 'Diagnose');
});

input.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') submitBtn.click();
});
</script>

</body>
</html>
